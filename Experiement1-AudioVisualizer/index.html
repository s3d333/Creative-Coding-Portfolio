<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audio Visualiser</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: white;
    }
    #instructions {
      margin-bottom: 12px;
      font-size: 20px;
      opacity: 0.5;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div id="instructions">
    press <b>1</b> mirror &nbsp;|&nbsp;
    <b>2</b> circular &nbsp;|&nbsp;
    <b>3</b> mountain &nbsp;|&nbsp;
    <b>4</b> kaleidoscope
  </div>

  <!-- p5.js core library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- p5.sound library (needed for mic and FFT) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>

  <!-- your sketch -->
  <script src="sketch.js"></script>

</body>
</html>
